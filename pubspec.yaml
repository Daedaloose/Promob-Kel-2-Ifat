name: peaceful_mind
description: A mindfulness and mental wellness app

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0
  http: ^1.2.0
  url_launcher: ^6.3.2
  camera: ^0.12.0+1
  shared_preferences: ^2.2.3
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  # To use Google Fonts (Nunito), add to pubspec.yaml:
  # Add the google_fonts package: ^6.1.0
  #
  # Or add Nunito as a local font:
  # fonts:
  #   - family: Nunito
  #     fonts:
  #       - asset: fonts/Nunito-Regular.ttf
  #       - asset: fonts/Nunito-Bold.ttf
  #         weight: 700
  #       - asset: fonts/Nunito-ExtraBold.ttf
  #         weight: 800
  #       - asset: fonts/Nunito-Black.ttf
  #         weight: 900
